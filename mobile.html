<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AMAJAZZ – Mobile</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET & ROOT ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f3ef;
  --bg2:#eceae4;
  --card:#ffffff;
  --border:#dedad2;
  --text:#1a1814;
  --text2:#6b6660;
  --text3:#a09a95;
  --accent:#c97a3a;
  --accent2:#2a5fa0;
  --green:#2a9e78;
  --red:#c93a3a;
  --amber:#b8860b;
  --purple:#7a3ac9;
  --nav-bg:#1a1814;
  --nav-h:62px;
  --radius:14px;
  --radius-sm:10px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-md:0 4px 20px rgba(0,0,0,.12);
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
/* Safe area pour Android/iOS */
:root{
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ── LAYOUT ── */
#app{display:none;flex-direction:column;height:100vh;position:relative}
#main{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;-webkit-overflow-scrolling:touch}
.page{display:none;padding:0 14px 14px;animation:fadeIn .18s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── HEADER ── */
.top-bar{
  background:var(--nav-bg);
  padding:12px 16px 10px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;
}
.top-bar-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:1.5px;
  color:#fff;flex:1;
}
.top-bar-sub{font-size:11px;color:rgba(255,255,255,.45);letter-spacing:.3px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block}
.sync-dot.error{background:var(--red)}
.sync-dot.loading{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── BOTTOM NAV ── */
#bottom-nav{
  position:fixed;
  bottom:0;left:0;right:0;
  height:68px;
  background:var(--nav-bg);
  display:flex;
  align-items:flex-start;
  padding-top:6px;
  border-top:1px solid rgba(255,255,255,.1);
  z-index:9999;
  box-shadow:0 -2px 16px rgba(0,0,0,.4);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,.4);font-size:8px;letter-spacing:.5px;
  text-transform:uppercase;font-family:'DM Sans',sans-serif;
  padding:4px 2px;transition:color .15s;position:relative;
}
.nav-btn .nav-icon{font-size:20px;line-height:1;transition:transform .15s}
.nav-btn.active{color:#fff}
.nav-btn.active .nav-icon{transform:scale(1.1)}
.nav-btn.active::after{
  content:'';position:absolute;top:0;left:20%;right:20%;height:2px;
  background:var(--accent);border-radius:0 0 3px 3px;
}

/* ── PAGE HEADER ── */
.page-top{padding:16px 0 10px;border-bottom:2px solid var(--text);margin-bottom:16px}
.page-top h2{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1.5px;color:var(--text)}
.page-top p{font-size:11px;color:var(--text3);margin-top:2px;letter-spacing:.3px;text-transform:uppercase}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px}
.card-sub{font-size:12px;color:var(--text2)}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 14px;text-align:center;box-shadow:var(--shadow);
}
.stat-v{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1;color:var(--text)}
.stat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.stat-card.c1 .stat-v{color:var(--accent2)}
.stat-card.c2 .stat-v{color:var(--green)}
.stat-card.c3 .stat-v{color:var(--purple)}
.stat-card.c4 .stat-v{color:var(--accent)}

/* ── EVENT CARDS ── */
.event-card{
  background:var(--nav-bg);color:#fff;
  border-radius:var(--radius);padding:16px;
  margin-bottom:10px;box-shadow:var(--shadow-md);
}
.event-date{font-size:10px;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;font-weight:600}
.event-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1.2;margin-bottom:4px}
.event-venue{font-size:12px;color:rgba(255,255,255,.5)}
.event-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:20px;font-weight:600;letter-spacing:.5px;margin-top:6px;text-transform:uppercase}
.badge-repet{background:rgba(42,95,160,.25);color:#7cb0ff}
.badge-concert{background:rgba(201,122,58,.25);color:#ffb87c}
.badge-projet{background:rgba(184,134,11,.2);color:var(--amber)}
.badge-confirme{background:rgba(42,158,120,.2);color:var(--green)}

/* ── SONG LIST ── */
.song-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;background:var(--card);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  margin-bottom:8px;
}
.song-num{font-size:12px;color:var(--text3);min-width:22px;font-weight:600}
.song-info{flex:1;min-width:0}
.song-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-artist{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-notes{font-size:10px;color:var(--amber);margin-top:2px;line-height:1.3}
.tag{display:inline-block;font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600;letter-spacing:.3px}
.tag-key{background:rgba(42,95,160,.12);color:var(--accent2)}
.tag-tempo{background:rgba(42,158,120,.12);color:var(--green)}

/* ── SET CARDS ── */
.set-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.set-header{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.set-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--text)}
.set-meta{font-size:11px;color:var(--text3);margin-top:2px}
.set-songs{padding:8px 16px 12px}
.set-song-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.set-song-item:last-child{border-bottom:none}
.set-song-num{font-size:10px;color:var(--text3);min-width:18px;font-weight:600}
.set-song-name{font-size:12px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.set-note{font-size:10px;color:var(--amber);padding:2px 0 0 26px;line-height:1.3}
.set-print-btn{
  display:block;width:calc(100% - 32px);margin:0 16px 12px;
  padding:9px;background:var(--nav-bg);color:#fff;
  border:none;border-radius:var(--radius-sm);font-size:12px;
  font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;
  letter-spacing:.3px;
}

/* ── CONCERT CARDS ── */
.concert-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.concert-card.statut-annule{opacity:.55}
.concert-header{display:flex;gap:12px;padding:14px 16px;align-items:flex-start}
.concert-date-block{text-align:center;min-width:48px;background:var(--nav-bg);border-radius:var(--radius-sm);padding:6px 8px;color:#fff;flex-shrink:0}
.concert-day{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;color:#fff}
.concert-month{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.6)}
.concert-year{font-size:9px;color:rgba(255,255,255,.4);margin-top:1px}
.concert-info{flex:1;min-width:0}
.concert-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.concert-venue{font-size:11px;color:var(--text3)}
.concert-set-badge{font-size:10px;color:var(--accent);margin-top:4px;font-weight:500}
.concert-notes-text{font-size:11px;color:var(--text2);margin-top:3px;font-style:italic}
.concert-songs{padding:0 16px 12px;border-top:1px solid var(--border)}
.csp-title{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;padding:8px 0 6px;font-weight:600}
.csp-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)}
.csp-row:last-child{border-bottom:none}
.csp-num{font-size:10px;color:var(--text3);min-width:18px;font-weight:600}
.csp-name{font-size:12px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csp-note{font-size:10px;color:var(--amber);padding:2px 0 0 26px;line-height:1.3}
.concert-print-btn{
  display:block;width:calc(100% - 32px);margin:4px 16px 12px;
  padding:9px;background:var(--nav-bg);color:#fff;
  border:none;border-radius:var(--radius-sm);font-size:12px;
  font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;
}

/* ── MEMBERS ── */
.member-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.member-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;text-align:center}
.member-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;margin:0 auto 8px;color:#fff}
.member-name{font-size:13px;font-weight:600;color:var(--text)}
.member-pseudo{font-size:11px;color:var(--text3);font-style:italic}
.member-instrument{font-size:10px;color:var(--accent);margin-top:2px;font-weight:500}
.family-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--text);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}

/* ── CALENDAR ── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month-label{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
.cal-nav-btn{background:var(--nav-bg);color:#fff;border:none;border-radius:8px;width:32px;height:32px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-name{text-align:center;font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;padding:4px 0;letter-spacing:.3px}
.cal-cell{min-height:44px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:3px;display:flex;flex-direction:column;gap:1px}
.cal-cell.dim{opacity:.35}
.cal-date-num{font-size:10px;color:var(--text2);font-weight:500;text-align:center;padding:1px 0}
.cal-date-num.today{background:var(--nav-bg);color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;margin:0 auto}
.cal-ev{font-size:8px;border-radius:3px;padding:1px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.cal-ev.repet{background:rgba(42,95,160,.15);color:var(--accent2)}
.cal-ev.concert{background:rgba(201,122,58,.15);color:var(--accent)}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.6}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;background:var(--nav-bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;
}
.loading-logo{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:3px;color:var(--accent)}
.loading-sub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase}
.loading-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin:0 3px;animation:bounce .9s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0.8);opacity:.5}40%{transform:scale(1.2);opacity:1}}

/* ── PREFERENCES PANEL ── */
#pref-panel{
  display:none;position:fixed;inset:0;z-index:8000;
  background:rgba(0,0,0,.5);
}
#pref-panel.open{display:flex;flex-direction:column;justify-content:flex-end}
.pref-sheet{
  background:var(--bg);border-radius:20px 20px 0 0;
  height:85vh;max-height:85vh;display:flex;flex-direction:column;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.pref-sheet-header{
  padding:16px 18px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.pref-sheet-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text)}
.pref-sheet-close{background:var(--nav-bg);color:#fff;border:none;border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pref-member-bar{padding:10px 18px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:8px;overflow-x:auto}
.pref-member-chip{
  flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;
  border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;
  white-space:nowrap;
}
.pref-member-chip.active{background:var(--nav-bg);color:#fff;border-color:var(--nav-bg)}
.pref-sheet-body{overflow-y:auto;flex:1;padding:0 0 80px;-webkit-overflow-scrolling:touch}
.pref-song-card{padding:12px 18px;border-bottom:1px solid var(--border)}
.pref-song-card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
.interest-row{display:flex;gap:6px;margin-bottom:8px}
.interest-chip{
  flex:1;padding:6px 4px;border:1px solid var(--border);border-radius:8px;
  font-size:10px;text-align:center;cursor:pointer;background:var(--card);
  color:var(--text3);font-family:'DM Sans',sans-serif;font-weight:500;
  transition:all .15s;
}
.interest-chip.active-0{background:#fce8e8;border-color:#e87c7c;color:#c93a3a}
.interest-chip.active-1{background:#fff8e8;border-color:#e8c87c;color:#b8860b}
.interest-chip.active-2{background:#e8f8f0;border-color:#5dc8a0;color:#2a9e78}
.impro-row{display:flex;align-items:center;justify-content:space-between}
.impro-label{font-size:12px;color:var(--text2)}
.impro-toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.impro-toggle input{opacity:0;width:0;height:0}
.impro-slider{position:absolute;inset:0;background:#ccc;border-radius:12px;cursor:pointer;transition:.2s}
.impro-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.impro-toggle input:checked + .impro-slider{background:var(--accent)}
.impro-toggle input:checked + .impro-slider:before{transform:translateX(20px)}
.pref-save-status{font-size:11px;color:var(--green);padding:6px 18px;text-align:center;min-height:24px}

/* Bouton préférences sur set/concert */
.pref-btn{
  display:block;width:calc(100% - 32px);margin:0 16px 8px;
  padding:9px;background:rgba(122,58,201,.12);color:var(--purple);
  border:1px solid rgba(122,58,201,.25);border-radius:var(--radius-sm);
  font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;
}

/* ── SYNTHÈSE PANEL ── */
#synth-panel{
  display:none;position:fixed;inset:0;z-index:8000;
  background:rgba(0,0,0,.5);
}
#synth-panel.open{display:flex;flex-direction:column;justify-content:flex-end}
.synth-sheet{
  background:var(--bg);border-radius:20px 20px 0 0;
  height:88vh;display:flex;flex-direction:column;
  animation:slideUp .25s ease;
}
.synth-sheet-header{
  padding:16px 18px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.synth-sheet-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text)}
.synth-sheet-close{background:var(--nav-bg);color:#fff;border:none;border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.synth-body{overflow-y:auto;flex:1;padding:12px 14px 80px;-webkit-overflow-scrolling:touch}
.synth-song-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px}
.synth-song-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.synth-song-artist{font-size:11px;color:var(--text3);margin-bottom:8px}
.synth-song-notes{font-size:11px;color:var(--amber);margin-bottom:8px}
.synth-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.synth-badge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600}
.synth-badge-yes{background:rgba(42,158,120,.15);color:var(--green)}
.synth-badge-impro{background:rgba(42,95,160,.15);color:var(--accent2)}
.synth-members{display:flex;flex-direction:column;gap:6px}
.synth-member-row{display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--bg2);border-radius:var(--radius-sm)}
.synth-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.synth-member-name{font-size:12px;font-weight:500;color:var(--text);flex:1}
.synth-interest{font-size:12px;font-weight:700}
.synth-impro-tag{font-size:9px;padding:2px 7px;background:rgba(42,95,160,.15);color:var(--accent2);border-radius:20px;font-weight:600}
.synth-btn{
  display:block;width:calc(100% - 32px);margin:0 16px 8px;
  padding:9px;background:rgba(42,158,120,.12);color:var(--green);
  border:1px solid rgba(42,158,120,.25);border-radius:var(--radius-sm);
  font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;
}

/* ── PRINT STYLES ── */
.print-html{display:none}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="loading-logo">♪ AMAJAZZ</div>
  <div class="loading-sub">Chargement…</div>
  <div class="loading-dots"><span></span><span></span><span></span></div>
</div>

<!-- APP -->
<div id="app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div style="flex:1">
      <div class="top-bar-title">♪ AMAJAZZ</div>
    </div>
    <span class="sync-dot" id="sync-dot"></span>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main">

    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="page-top">
        <h2>Tableau de bord</h2>
        <p id="today-label"></p>
      </div>
      <div class="stats-grid">
        <div class="stat-card c1"><div class="stat-v" id="s-morceaux">—</div><div class="stat-l">Morceaux</div></div>
        <div class="stat-card c2"><div class="stat-v" id="s-membres">—</div><div class="stat-l">Musiciens</div></div>
        <div class="stat-card c3"><div class="stat-v" id="s-sets">—</div><div class="stat-l">Répétitions</div></div>
        <div class="stat-card c4"><div class="stat-v" id="s-concerts">—</div><div class="stat-l">Prestations</div></div>
      </div>
      <div id="dash-upcoming"></div>
    </div>

    <!-- MORCEAUX -->
    <div class="page" id="page-morceaux">
      <div class="page-top">
        <h2>Morceaux</h2>
        <p id="song-count-m"></p>

  if(!setId) return [];
  return DB.set_songs.filter(ss=>ss.set_id===setId).sort((a,b)=>a.position-b.position)
    .map(ss=>({concert_id:concertId, song_id:ss.song_id, position:ss.position, notes:ss.set_notes||null}));
}

// ── PLANNING ──
function renderCalendar(){
  const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const days = ['L','M','M','J','V','S','D'];
  const today = new Date();
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay  = new Date(calYear, calMonth+1, 0);
  let startDow = firstDay.getDay()-1; if(startDow<0) startDow=6;

  document.getElementById('cal-label-m').textContent = months[calMonth]+' '+calYear;
  document.getElementById('planning-sub-m').textContent =
    DB.events.filter(e=>e.date.startsWith(calYear+'-'+String(calMonth+1).padStart(2,'0'))).length+' événement(s) ce mois';

  const allEvts = [
    ...DB.events.map(e=>({date:e.date, label:'Répét.', css:'repet'})),
    ...DB.concerts.map(c=>({date:c.date, label:'★ '+c.name, css:'concert'})),
  ];

  let html = days.map(d=>`<div class="cal-day-name">${d}</div>`).join('');
  for(let i=0;i<startDow;i++){
    const d = new Date(calYear, calMonth, -startDow+i+1);
    html += `<div class="cal-cell dim"><div class="cal-date-num">${d.getDate()}</div></div>`;
  }
  for(let d=1;d<=lastDay.getDate();d++){
    const isToday = d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();
    const dateStr = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const evts = allEvts.filter(e=>e.date===dateStr);
    html += `<div class="cal-cell">
      <div class="cal-date-num${isToday?' today':''}">${d}</div>
      ${evts.map(e=>`<div class="cal-ev ${e.css}">${esc(e.label)}</div>`).join('')}
    </div>`;
  }
  const total = startDow + lastDay.getDate();
  const rem = (7-(total%7))%7;
  for(let i=1;i<=rem;i++) html += `<div class="cal-cell dim"><div class="cal-date-num">${i}</div></div>`;

  document.getElementById('cal-grid-m').innerHTML = html;
}

window.calNav = function(dir){
  calMonth += dir;
  if(calMonth<0){calMonth=11;calYear--}
  if(calMonth>11){calMonth=0;calYear++}
  renderCalendar();
};

function buildPrintRows(songs, notesMap){
  return songs.map((entry,i)=>{
    const s = DB.songs.find(x=>x.id===(entry.song_id||entry.id));
    if(!s) return '';
    const note = [notesMap?notesMap[s.id]:null, entry.notes, s.notes].filter(Boolean).join(' — ');
    const improvs = DB.members.filter(m=>{
      const p = DB.preferences.find(pr=>pr.member_id===m.id&&pr.song_id===s.id);
      return p?.impro;
    });
    return `<tr>
      <td style="padding:8px;text-align:center;font-size:12px;color:#888">${i+1}</td>
      <td style="padding:8px">
        <strong style="font-size:13px">${esc(s.name)}</strong>
        ${s.artist?`<span style="color:#888;font-size:11px"> — ${esc(s.artist)}</span>`:''}
        ${note?`<div style="font-size:11px;color:#e6860a;margin-top:3px">⚠ ${esc(note)}</div>`:''}
      </td>
      <td style="padding:8px;font-size:12px;font-weight:600">${s.key||''}</td>
      <td style="padding:8px;font-size:11px;color:#555;text-align:center">${s.tempo||''}</td>
      <td style="padding:8px;font-size:11px;color:#1a6faf;font-style:italic">${improvs.map(m=>m.prenom).join(', ')}</td>
    </tr>`;
  }).join('');
}

function openPrint(html){
  const win = window.open('','_blank');
  if(win){ win.document.write(html); win.document.close(); }
  else alert('Autorisez les popups pour imprimer.');
}

function printSet(setId){
  const set = DB.sets.find(x=>x.id===setId);
  if(!set) return;
  const rows = DB.set_songs.filter(ss=>ss.set_id===setId).sort((a,b)=>a.position-b.position);
  const notesMap = {};
  rows.forEach(ss=>{ if(ss.set_notes) notesMap[ss.song_id]=ss.set_notes; });
  openPrint(buildPrintPage(set.name, 'Programme de répétition', '', '', '', buildPrintRows(rows, notesMap)));
}

function printConcert(concertId){
  const c = DB.concerts.find(x=>x.id===concertId);
  if(!c) return;
  const cSongs = getConcertSongs(concertId, c.set_id);
  const dateStr = c.date ? new Date(c.date+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) : 'Date à confirmer';
  openPrint(buildPrintPage(c.name, c.set_id?'♩ '+DB.sets.find(s=>s.id===c.set_id)?.name:'', dateStr, c.time?.slice(0,5)||'', c.venue||'', buildPrintRows(cSongs, null)));
}

function buildPrintPage(title, subtitle, dateStr, timeStr, venue, rows){
  return `<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>${title}</title>
  <style>
    body{font-family:'DM Sans',sans-serif;color:#1a1a1a;padding:0;margin:0}
    @page{size:A4;margin:16mm}
    .header{display:flex;align-items:center;gap:16px;padding-bottom:12px;border-bottom:2px solid #1a1a1a;margin-bottom:18px}
    .title{font-family:sans-serif;font-size:22px;font-weight:700}
    .sub{font-size:12px;color:#888;font-style:italic;margin-top:2px}

// ── PREFERENCES MOBILE ──
let _prefSetId = null;
let _prefMemberId = null;
const interestLabels = ['😐 Non','😊 Moyen','🔥 Oui !'];

function openPrefPanel(setId, title){
  _prefSetId = setId;
  _prefMemberId = DB.members.length ? DB.members[0].id : null;
  document.getElementById('pref-sheet-title').textContent = '🎵 ' + title;
  renderPrefMembers();
  renderPrefBody();
  document.getElementById('pref-panel').classList.add('open');
  document.getElementById('pref-save-status-m').textContent = '';
}

function closePrefPanel(e){
  if(e.target === document.getElementById('pref-panel')) closePrefPanelDirect();
}
function closePrefPanelDirect(){
  document.getElementById('pref-panel').classList.remove('open');
}

function renderPrefMembers(){
  const bar = document.getElementById('pref-member-bar');
  bar.innerHTML = DB.members.map(m=>`
    <div class="pref-member-chip ${m.id===_prefMemberId?'active':''}"
      onclick="selectPrefMember(${m.id})">
      ${esc(m.prenom)}
    </div>`).join('');
}

function selectPrefMember(memberId){
  _prefMemberId = memberId;
  renderPrefMembers();
  renderPrefBody();
}

function renderPrefBody(){
  const body = document.getElementById('pref-sheet-body');
  if(!_prefSetId || !_prefMemberId){
    body.innerHTML = '<div class="empty"><p>Sélectionnez un musicien.</p></div>';
    return;
  }
  const songIds = DB.set_songs.filter(ss=>ss.set_id===_prefSetId)
    .sort((a,b)=>a.position-b.position).map(ss=>ss.song_id);
  const songs = songIds.map(id=>DB.songs.find(s=>s.id===id)).filter(Boolean);
  if(!songs.length){
    body.innerHTML = '<div class="empty"><p>Aucun morceau dans ce set.</p></div>';
    return;
  }
  body.innerHTML = songs.map((s,i)=>{
    const p = DB.preferences.find(pr=>pr.set_id==_prefSetId && pr.member_id==_prefMemberId && pr.song_id==s.id);
    const interest = p?.interest ?? null;
    const impro = p?.impro ?? false;
    return `<div class="pref-song-card">
      <div class="pref-song-card-name">${i+1}. ${esc(s.name)}${s.key?` <span style="color:var(--accent2);font-size:11px">${esc(s.key)}</span>`:''}</div>
      <div class="interest-row">
        ${[0,1,2].map(v=>`<div class="interest-chip ${interest===v?'active-'+v:''}"
          onclick="mSetInterest(${s.id},${v})">${interestLabels[v]}</div>`).join('')}
      </div>
      <div class="impro-row">
        <span class="impro-label">Solo / Improvisation</span>
        <label class="impro-toggle">
          <input type="checkbox" ${impro?'checked':''} onchange="mSetImpro(${s.id},this.checked)">
          <span class="impro-slider"></span>
        </label>
      </div>
    </div>`;
  }).join('');
}

async function mSetInterest(songId, value){
  if(!_prefSetId||!_prefMemberId) return;
  const p = DB.preferences.find(pr=>pr.set_id==_prefSetId&&pr.member_id==_prefMemberId&&pr.song_id==songId);
  const payload = {set_id:_prefSetId, member_id:_prefMemberId, song_id:songId, interest:value, impro:p?.impro??false};
  await mUpsertPref(payload);
  renderPrefBody();
}

async function mSetImpro(songId, value){
  if(!_prefSetId||!_prefMemberId) return;
  const p = DB.preferences.find(pr=>pr.set_id==_prefSetId&&pr.member_id==_prefMemberId&&pr.song_id==songId);
  const payload = {set_id:_prefSetId, member_id:_prefMemberId, song_id:songId, interest:p?.interest??null, impro:value};
  await mUpsertPref(payload);
}

async function mUpsertPref(payload){
  const status = document.getElementById('pref-save-status-m');
  status.textContent = '⟳ Sauvegarde…';
  try {
    const existing = DB.preferences.find(p=>p.set_id==payload.set_id&&p.member_id==payload.member_id&&p.song_id==payload.song_id);
    let error;
    if(existing){
      ({error} = await sb.from('preferences').update({interest:payload.interest,impro:payload.impro}).eq('id',existing.id));
    } else {
      ({error} = await sb.from('preferences').insert(payload));
    }
    if(error) throw error;
    const idx = DB.preferences.findIndex(p=>p.set_id==payload.set_id&&p.member_id==payload.member_id&&p.song_id==payload.song_id);
    if(idx>=0) DB.preferences[idx] = {...DB.preferences[idx],...payload};
    else DB.preferences.push({...payload, id:Date.now()});
    status.textContent = '✓ Sauvegardé';
    setTimeout(()=>{ status.textContent=''; }, 2000);
  } catch(e){
    status.textContent = '✗ Erreur';
  }
}

// ── SYNTHÈSE MOBILE ──
function openSynthPanel(setId, songList, title){
  document.getElementById('synth-sheet-title').textContent = '📊 ' + title;
  renderSynthBody(setId, songList);
  document.getElementById('synth-panel').classList.add('open');
}
function closeSynthPanel(e){
  if(e.target===document.getElementById('synth-panel')) closeSynthPanelDirect();
}
function closeSynthPanelDirect(){
  document.getElementById('synth-panel').classList.remove('open');
}

function renderSynthBody(setId, cSongList){
  const body = document.getElementById('synth-body');
  // Use set_songs or concert_songs depending on what was passed
  const songRows = cSongList || DB.set_songs.filter(ss=>ss.set_id===setId).sort((a,b)=>a.position-b.position);
  const songs = songRows.map(r=>DB.songs.find(s=>s.id===(r.song_id||r.id))).filter(Boolean);

  if(!songs.length){
    body.innerHTML='<div class="empty"><p>Aucun morceau dans ce programme.</p></div>';
    return;
  }

  const interestIcon  = {0:'✗', 1:'~', 2:'✓'};
  const interestColor = {0:'#c93a3a', 1:'#b8860b', 2:'#2a9e78'};
  const interestLabel = {0:'Non', 1:'Moyen', 2:'Oui !'};

  body.innerHTML = songs.map((s,i)=>{
    const row = songRows[i];
    const noteSet  = row?.set_notes || row?.notes || '';
    const noteSong = s.notes || '';
    const allNotes = [noteSet, noteSong].filter(Boolean).join(' — ');

    const memberPrefs = DB.members.map(m=>({
      m,
      p: setId ? DB.preferences.find(pr=>pr.set_id==setId&&pr.member_id==m.id&&pr.song_id==s.id) : null
    }));
    const enthousiastes = memberPrefs.filter(x=>x.p?.interest===2);
    const impros = memberPrefs.filter(x=>x.p?.impro);
    const color = familyColors;

    return `<div class="synth-song-card">
      <div class="synth-song-title">${i+1}. ${esc(s.name)}</div>
      ${s.artist?`<div class="synth-song-artist">${esc(s.artist)}</div>`:''}
      ${allNotes?`<div class="synth-song-notes">⚠ ${esc(allNotes)}</div>`:''}
      <div class="synth-badges">
        ${s.key?`<span class="synth-badge" style="background:rgba(42,95,160,.12);color:var(--accent2)">${esc(s.key)}</span>`:''}
        ${s.tempo?`<span class="synth-badge" style="background:rgba(42,158,120,.12);color:var(--green)">♩${s.tempo}</span>`:''}
        ${enthousiastes.length?`<span class="synth-badge synth-badge-yes">✓ ${enthousiastes.length} partant${enthousiastes.length>1?'s':''}</span>`:''}
        ${impros.length?`<span class="synth-badge synth-badge-impro">🎸 ${impros.map(x=>x.m.prenom).join(', ')}</span>`:''}
      </div>
      ${impros.length?`<div class="synth-members">
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;font-weight:600">Impros / Solos</div>
        ${impros.map(({m})=>{
          const bg = familyColors[m.family]||'#888';
          return `<div class="synth-member-row">
            <div class="synth-avatar" style="background:${bg}">${esc(m.avatar||(m.prenom||'?').charAt(0))}</div>
            <span class="synth-member-name">${esc(m.prenom)}</span>
            <span class="synth-impro-tag">🎸 impro</span>
          </div>`;
        }).join('')}
      </div>`:''} 
    </div>`;
  }).join('');
}

    document.getElementById('loading').innerHTML =
