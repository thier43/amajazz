<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="manifest-mobile.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AMAJAZZ">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#c97a3a">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AMAJAZZ – Mobile</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET & ROOT ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f3ef;
  --bg2:#eceae4;
  --card:#ffffff;
  --border:#dedad2;
  --text:#1a1814;
  --text2:#6b6660;
  --text3:#a09a95;
  --accent:#c97a3a;
  --accent2:#2a5fa0;
  --green:#2a9e78;
  --red:#c93a3a;
  --amber:#b8860b;
  --purple:#7a3ac9;
  --nav-bg:#1a1814;
  --nav-h:62px;
  --radius:14px;
  --radius-sm:10px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-md:0 4px 20px rgba(0,0,0,.12);
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
/* Safe area pour Android/iOS */
:root{
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ── LAYOUT ── */
#app{display:none;flex-direction:column;height:100vh;position:relative}
#main{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:160px;-webkit-overflow-scrolling:touch}
.page{display:none;padding:0 14px 14px;animation:fadeIn .18s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── HEADER ── */
.top-bar{
  background:var(--nav-bg);
  padding:12px 16px 10px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;
}
.top-bar-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:1.5px;
  color:#fff;flex:1;
}
.top-bar-sub{font-size:11px;color:rgba(255,255,255,.45);letter-spacing:.3px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block}
.sync-dot.error{background:var(--red)}
.sync-dot.loading{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── BOTTOM NAV ── */
#bottom-nav{
  position:fixed;
  bottom:0;left:0;right:0;
  height:68px;
  background:var(--nav-bg);
  display:flex;
  align-items:flex-start;
  padding-top:6px;
  border-top:1px solid rgba(255,255,255,.1);
  z-index:9999;
  box-shadow:0 -2px 16px rgba(0,0,0,.4);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,.4);font-size:8px;letter-spacing:.5px;
  text-transform:uppercase;font-family:'DM Sans',sans-serif;
  padding:4px 2px;transition:color .15s;position:relative;
}
.nav-btn .nav-icon{font-size:20px;line-height:1;transition:transform .15s}
.nav-btn.active{color:#fff}
.nav-btn.active .nav-icon{transform:scale(1.1)}
.nav-btn.active::after{
  content:'';position:absolute;top:0;left:20%;right:20%;height:2px;
  background:var(--accent);border-radius:0 0 3px 3px;
}

/* ── PAGE HEADER ── */
.page-top{padding:16px 0 10px;border-bottom:2px solid var(--text);margin-bottom:16px}
.page-top h2{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1.5px;color:var(--text)}
.page-top p{font-size:11px;color:var(--text3);margin-top:2px;letter-spacing:.3px;text-transform:uppercase}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px}
.card-sub{font-size:12px;color:var(--text2)}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 14px;text-align:center;box-shadow:var(--shadow);
}
.stat-v{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1;color:var(--text)}
.stat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.stat-card.c1 .stat-v{color:var(--accent2)}
.stat-card.c2 .stat-v{color:var(--green)}
.stat-card.c3 .stat-v{color:var(--purple)}
.stat-card.c4 .stat-v{color:var(--accent)}

/* ── EVENT CARDS ── */
.event-card{
  background:var(--nav-bg);color:#fff;
  border-radius:var(--radius);padding:16px;
  margin-bottom:10px;box-shadow:var(--shadow-md);
}
.event-date{font-size:10px;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;font-weight:600}
.event-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1.2;margin-bottom:4px}
.event-venue{font-size:12px;color:rgba(255,255,255,.5)}
.event-card-compact{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:10px 12px;
  margin-bottom:8px;cursor:pointer;
  transition:background .15s;
}
.event-card-compact:active{background:var(--bg2)}
.event-compact-icon{font-size:22px;flex-shrink:0}
.event-compact-info{flex:1;min-width:0}
.event-compact-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event-compact-meta{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:20px;font-weight:600;letter-spacing:.5px;margin-top:6px;text-transform:uppercase}
.badge-repet{background:rgba(42,95,160,.25);color:#7cb0ff}
.badge-concert{background:rgba(201,122,58,.25);color:#ffb87c}
.badge-projet{background:rgba(184,134,11,.2);color:var(--amber)}
.badge-confirme{background:rgba(42,158,120,.2);color:var(--green)}

/* ── SONG LIST ── */
.song-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;background:var(--card);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  margin-bottom:8px;
}
.song-num{font-size:12px;color:var(--text3);min-width:22px;font-weight:600}
.song-info{flex:1;min-width:0}
.song-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-artist{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-notes{font-size:10px;color:var(--amber);margin-top:2px;line-height:1.3}
.tag{display:inline-block;font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600;letter-spacing:.3px}
.tag-key{background:rgba(42,95,160,.12);color:var(--accent2)}
.tag-tempo{background:rgba(42,158,120,.12);color:var(--green)}

/* ── SET CARDS ── */
.set-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.set-header{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.set-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--text)}
.set-meta{font-size:11px;color:var(--text3);margin-top:2px}
.set-songs{padding:8px 16px 12px}
.set-song-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.set-song-item:last-child{border-bottom:none}
.set-song-num{font-size:10px;color:var(--text3);min-width:18px;font-weight:600}
.set-song-name{font-size:12px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.set-note{font-size:10px;color:var(--amber);padding:2px 0 0 26px;line-height:1.3}
.prio-dot-m{width:10px;height:10px;border-radius:50%;flex-shrink:0;cursor:pointer;border:1px solid rgba(0,0,0,.1)}
.prio-0m{background:#d0ccc5}
.prio-1m{background:#b8860b;box-shadow:0 0 4px rgba(184,134,11,.5)}
.prio-2m{background:#c93a3a;box-shadow:0 0 6px rgba(201,58,58,.6)}
.set-print-btn{
  display:block;width:calc(100% - 32px);margin:0 16px 12px;
  padding:9px;background:var(--nav-bg);color:#fff;
  border:none;border-radius:var(--radius-sm);font-size:12px;
  font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;
  letter-spacing:.3px;
}

/* ── CONCERT CARDS ── */
.concert-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.concert-card.statut-annule{opacity:.55}
.concert-header{display:flex;gap:12px;padding:14px 16px;align-items:flex-start}
.concert-date-block{text-align:center;min-width:48px;background:var(--nav-bg);border-radius:var(--radius-sm);padding:6px 8px;color:#fff;flex-shrink:0}
.concert-day{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;color:#fff}
.concert-month{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.6)}
.concert-year{font-size:9px;color:rgba(255,255,255,.4);margin-top:1px}
.concert-info{flex:1;min-width:0}
.concert-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.concert-venue{font-size:11px;color:var(--text3)}
.concert-set-badge{font-size:10px;color:var(--accent);margin-top:4px;font-weight:500}
.concert-notes-text{font-size:11px;color:var(--text2);margin-top:3px;font-style:italic}
.concert-songs{padding:0 16px 12px;border-top:1px solid var(--border)}
.csp-title{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;padding:8px 0 6px;font-weight:600}
.csp-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)}
.csp-row:last-child{border-bottom:none}
.csp-num{font-size:10px;color:var(--text3);min-width:18px;font-weight:600}
.csp-name{font-size:12px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csp-note{font-size:10px;color:var(--amber);padding:2px 0 0 26px;line-height:1.3}
.concert-print-btn{
  display:block;width:calc(100% - 32px);margin:4px 16px 12px;
  padding:9px;background:var(--nav-bg);color:#fff;
  border:none;border-radius:var(--radius-sm);font-size:12px;
  font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;
}

/* ── MEMBERS ── */
.member-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.member-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;text-align:center}
.member-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;margin:0 auto 8px;color:#fff}
.member-name{font-size:13px;font-weight:600;color:var(--text)}
.member-pseudo{font-size:11px;color:var(--text3);font-style:italic}
.member-instrument{font-size:10px;color:var(--accent);margin-top:2px;font-weight:500}
.family-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--text);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}

/* ── CALENDAR ── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month-label{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
.cal-nav-btn{background:var(--nav-bg);color:#fff;border:none;border-radius:8px;width:32px;height:32px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-name{text-align:center;font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;padding:4px 0;letter-spacing:.3px}
.cal-cell{min-height:44px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:3px;display:flex;flex-direction:column;gap:1px}
.cal-cell.dim{opacity:.35}
.cal-date-num{font-size:10px;color:var(--text2);font-weight:500;text-align:center;padding:1px 0}
.cal-date-num.today{background:var(--nav-bg);color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;margin:0 auto}
.cal-ev{font-size:8px;border-radius:3px;padding:1px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.cal-ev.repet{background:rgba(42,95,160,.15);color:var(--accent2)}
.cal-ev.concert{background:rgba(201,122,58,.15);color:var(--accent)}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.6}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;background:var(--nav-bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;
}
.loading-logo{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:3px;color:var(--accent)}
.loading-sub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase}
.loading-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin:0 3px;animation:bounce .9s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0.8);opacity:.5}40%{transform:scale(1.2);opacity:1}}

/* ── PREFERENCES PANEL ── */
#pref-panel{
  display:none;position:fixed;inset:0;z-index:8000;
  background:rgba(0,0,0,.5);
}
#pref-panel.open{display:flex;flex-direction:column;justify-content:flex-end}
.pref-sheet{
  background:var(--bg);border-radius:20px 20px 0 0;
  height:85vh;max-height:85vh;display:flex;flex-direction:column;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.pref-sheet-header{
  padding:16px 18px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.pref-sheet-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text)}
.pref-sheet-close{background:var(--nav-bg);color:#fff;border:none;border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pref-member-bar{padding:10px 18px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:8px;overflow-x:auto}
.pref-member-chip{
  flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;
  border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;
  white-space:nowrap;
}
.pref-member-chip.active{background:var(--nav-bg);color:#fff;border-color:var(--nav-bg)}
.pref-sheet-body{overflow-y:auto;flex:1;padding:0 0 80px;-webkit-overflow-scrolling:touch}
.pref-song-card{padding:12px 18px;border-bottom:1px solid var(--border)}
.pref-song-card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
.interest-row{display:flex;gap:6px;margin-bottom:8px}
.interest-chip{
  flex:1;padding:6px 4px;border:1px solid var(--border);border-radius:8px;
  font-size:10px;text-align:center;cursor:pointer;background:var(--card);
  color:var(--text3);font-family:'DM Sans',sans-serif;font-weight:500;
  transition:all .15s;
}
.interest-chip.active-0{background:#fce8e8;border-color:#e87c7c;color:#c93a3a}
.interest-chip.active-1{background:#fff8e8;border-color:#e8c87c;color:#b8860b}
.interest-chip.active-2{background:#e8f8f0;border-color:#5dc8a0;color:#2a9e78}
.impro-row{display:flex;align-items:center;justify-content:space-between}
.impro-label{font-size:12px;color:var(--text2)}
.impro-toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.impro-toggle input{opacity:0;width:0;height:0}
.impro-slider{position:absolute;inset:0;background:#ccc;border-radius:12px;cursor:pointer;transition:.2s}
.impro-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.impro-toggle input:checked + .impro-slider{background:var(--accent)}
.impro-toggle input:checked + .impro-slider:before{transform:translateX(20px)}
.pref-save-status{font-size:11px;color:var(--green);padding:6px 18px;text-align:center;min-height:24px}

/* Bouton préférences sur set/concert */
.pref-btn{
  display:block;width:calc(100% - 32px);margin:0 16px 8px;
  padding:9px;background:rgba(122,58,201,.12);color:var(--purple);
  border:1px solid rgba(122,58,201,.25);border-radius:var(--radius-sm);
  font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;
}

/* ── SYNTHÈSE PANEL ── */
#synth-panel{
  display:none;position:fixed;inset:0;z-index:8000;
  background:rgba(0,0,0,.5);
}
#synth-panel.open{display:flex;flex-direction:column;justify-content:flex-end}
.synth-sheet{
  background:var(--bg);border-radius:20px 20px 0 0;
  height:88vh;display:flex;flex-direction:column;
  animation:slideUp .25s ease;
}
.synth-sheet-header{
  padding:16px 18px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.synth-sheet-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text)}
.synth-sheet-close{background:var(--nav-bg);color:#fff;border:none;border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.synth-body{overflow-y:auto;flex:1;padding:12px 14px 80px;-webkit-overflow-scrolling:touch}
.synth-song-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px}
.synth-song-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.synth-song-artist{font-size:11px;color:var(--text3);margin-bottom:8px}
.synth-song-notes{font-size:11px;color:var(--amber);margin-bottom:8px}
.synth-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.synth-badge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600}
.synth-badge-yes{background:rgba(42,158,120,.15);color:var(--green)}
.synth-badge-impro{background:rgba(42,95,160,.15);color:var(--accent2)}
.synth-members{display:flex;flex-direction:column;gap:6px}
.synth-member-row{display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--bg2);border-radius:var(--radius-sm)}
.synth-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.synth-member-name{font-size:12px;font-weight:500;color:var(--text);flex:1}
.synth-interest{font-size:12px;font-weight:700}
.synth-impro-tag{font-size:9px;padding:2px 7px;background:rgba(42,95,160,.15);color:var(--accent2);border-radius:20px;font-weight:600}
.synth-btn{
  display:block;width:calc(100% - 32px);margin:0 16px 8px;
  padding:9px;background:rgba(42,158,120,.12);color:var(--green);
  border:1px solid rgba(42,158,120,.25);border-radius:var(--radius-sm);
  font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;
}

.minput{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--card);color:var(--text);outline:none}

<script>
// ── CONFIG ──
const SUPABASE_URL  = 'https://hirykfprszvqkeerpbtt.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpcnlrZnByc3p2cWtlZXJwYnR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTYwMDQsImV4cCI6MjA5MTM5MjAwNH0.W5U0MsMq21j9Dsvw3MD3AyLnrOfyxz1dd31ziXe0wH8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let DB = { songs:[], members:[], sets:[], set_songs:[], concerts:[], concert_songs:[], events:[], preferences:[], event_attendance:[] };
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

// ── UTILS ──
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function setSyncStatus(s){
  const d = document.getElementById('sync-dot');
  if(d) d.className = 'sync-dot'+(s==='loading'?' loading':s==='error'?' error':'');
}
const familyColors = {
  'Soufflants':'#e87c7c','Guitares':'#7c9fe8','Basse':'#7ce8b8',
  'Batterie':'#e8a87c','Chant':'#a87ce8','Clavier':'#5dc8a0','Autres':'#888'
};

// ── LOAD ──
async function loadAll(){
  const [songs,members,sets,set_songs,concerts,concert_songs,events,preferences,ev_att] = await Promise.all([
    sb.from('songs').select('*').order('name'),
    sb.from('members').select('*').order('prenom'),
    sb.from('sets').select('*').order('name'),
    sb.from('set_songs').select('*').order('position'),
    sb.from('concerts').select('*').order('date'),
    sb.from('concert_songs').select('*').order('position'),
    sb.from('events').select('*').order('date'),
    sb.from('preferences').select('*'),
    sb.from('event_attendance').select('*'),
  ]);
  DB.songs          = songs.data          || [];
  DB.members        = members.data        || [];
  DB.sets           = sets.data           || [];
  DB.set_songs      = set_songs.data      || [];
  DB.concerts       = concerts.data       || [];
  DB.concert_songs  = concert_songs.data  || [];
  DB.events         = events.data         || [];
  DB.preferences    = preferences.data    || [];
  DB.event_attendance = ev_att.data || [];
}

// ── NAVIGATION ──
function goTo(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page)?.classList.add('active');
  document.querySelector('.nav-btn[data-page="'+page+'"]')?.classList.add('active');
  document.getElementById('main')?.scrollTo(0,0);
  const renders = {
    dashboard:renderDashboard, morceaux:renderSongs,
    sets:renderSets, concerts:renderConcerts,
    planning:renderCalendar, membres:renderMembers,
  };
  if(renders[page]) renders[page]();
}

// ── DASHBOARD ──
function renderDashboard(){
  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);

  document.getElementById('today-label').textContent =
    now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  document.getElementById('s-morceaux').textContent  = DB.songs.length;
  document.getElementById('s-membres').textContent   = DB.members.length;
  document.getElementById('s-sets').textContent      = DB.sets.length;
  document.getElementById('s-concerts').textContent  = DB.concerts.length;

  // Prochains événements
  const nextRepets = DB.events
    .filter(e=>e.date>=todayStr)
    .sort((a,b)=>a.date.localeCompare(b.date))
    .slice(0,3)
    .map(e=>({
      id:e.id, date:e.date, time:e.time,
      label: e.set_id ? DB.sets.find(s=>s.id===e.set_id)?.name||'Répétition' : 'Répétition',
      venue:e.venue||'', type:'repet', cancelled:!!e.cancelled
    }));

  const nextConcert = DB.concerts
    .filter(c=>c.status!=='annule'&&c.date&&c.date>=todayStr)
    .sort((a,b)=>a.date.localeCompare(b.date))[0]
    || DB.concerts.filter(c=>c.status!=='annule'&&!c.date)[0];

  const items = [...nextRepets];
  if(nextConcert) items.push({
    date:nextConcert.date||null, time:nextConcert.time,
    label:nextConcert.name, venue:nextConcert.venue||'',
    type:'concert', status:nextConcert.status
  });

  // Absents prochaine répétition
  (()=>{
    const el=document.getElementById('dash-absents-m'); if(!el) return;
    const today=new Date().toISOString().slice(0,10);
    const nextEvt=DB.events.filter(e=>e.date>=today&&e.type!=='prestation').sort((a,b)=>a.date.localeCompare(b.date))[0];
    if(!nextEvt){el.innerHTML='';return;}
    const absents=DB.event_attendance.filter(a=>parseInt(a.event_id)===nextEvt.id&&a.status==='absent')
      .map(a=>DB.members.find(m=>m.id===a.member_id)).filter(Boolean);
    if(!absents.length){el.innerHTML='';return;}
    const set=nextEvt.set_id?DB.sets.find(s=>s.id===nextEvt.set_id):null;
    const d=new Date(nextEvt.date+'T12:00:00');
    el.innerHTML=`<div style="padding:10px 14px;background:rgba(231,76,60,.07);border:1px solid rgba(231,76,60,.2);border-left:3px solid var(--red);border-radius:10px">
      <div style="font-size:11px;font-weight:600;color:var(--red);margin-bottom:4px">❌ Absents — ${esc(set?.name||'Répétition')} · ${d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}</div>
      <div style="font-size:13px;color:var(--text)">${absents.map(m=>esc(m.prenom+' '+(m.nom||''))).join(', ')}</div>
    </div>`;
  })();

  const container = document.getElementById('dash-upcoming');
  if(!items.length){
    container.innerHTML = '<div class="empty"><div class="empty-icon">📅</div><p>Aucun événement à venir.</p></div>';
    return;
  }
  container.innerHTML = items.map(e=>{
    const d = e.date ? new Date(e.date+'T12:00:00') : null;
    const dateShort = d
      ? d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})
      : 'Date ?';
    const timeStr = e.time ? e.time.slice(0,5) : '';
    const dest = e.type==='concert' ? 'concerts' : 'sets';
    const icon = e.type==='concert' ? '🎤' : '🎵';
    const badgeClass = e.type==='concert' ? `badge-${e.status||'projet'}` : 'badge-repet';
    const badgeText = e.type==='concert' ? (e.status==='confirme'?'Confirmé':'Projet') : 'Répét.';
    const isCancelled = e.type==='repet' && e.cancelled;
    return `<div class="event-card-compact" onclick="goTo('${dest}')" style="position:relative;overflow:hidden;${isCancelled?'background:rgba(231,76,60,.04);border-color:rgba(231,76,60,.25);':''};opacity:${isCancelled?.7:1}">
      ${isCancelled?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">
        <div style="color:rgba(231,76,60,.5);font-size:18px;font-weight:900;letter-spacing:4px;transform:rotate(-8deg);text-transform:uppercase;font-family:'Bebas Neue',sans-serif">ANNULÉE</div>
      </div>`:''}
      <div class="event-compact-icon">${icon}</div>
      <div class="event-compact-info" style="${isCancelled?'text-decoration:line-through;color:var(--red);':''}">
        <div class="event-compact-title" style="${isCancelled?'color:var(--red);':''}">${esc(e.label)}</div>
        <div class="event-compact-meta">${dateShort}${timeStr?' · '+timeStr:''}${e.venue?' · '+esc(e.venue):''}</div>
      </div>
      <span class="event-badge ${badgeClass}" style="flex-shrink:0;${isCancelled?'background:rgba(231,76,60,.15);color:var(--red);':''}">${isCancelled?'Annulée':badgeText}</span>
    </div>`;
  }).join('');
}

// ── MORCEAUX ──
function renderSongs(){
  const el = document.getElementById('song-list-m');
  document.getElementById('song-count-m').textContent = DB.songs.length+' morceau'+(DB.songs.length>1?'x':'');
  if(!DB.songs.length){
    el.innerHTML = '<div class="empty"><div class="empty-icon">🎵</div><p>Aucun morceau enregistré.</p></div>';
    return;
  }
  el.innerHTML = DB.songs.map((s,i)=>`
    <div class="song-row" onclick="openSongModalM(${s.id})" style="cursor:pointer">
      <div class="song-num">${i+1}</div>
      <div class="song-info">
        <div class="song-name">${esc(s.name)}</div>
        ${s.artist?`<div class="song-artist">${esc(s.artist)}</div>`:''}
        ${s.notes?`<div class="song-notes">📝 ${esc(s.notes)}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
        ${s.key?`<span class="tag tag-key">${esc(s.key)}</span>`:''}
        ${s.tempo?`<span class="tag tag-tempo">♩${s.tempo}</span>`:''}
        ${s.folder_link?`<a href="${esc(s.folder_link)}" target="_blank" onclick="event.stopPropagation()" style="font-size:16px;text-decoration:none">📂</a>`:''}
        <span style="font-size:10px;color:var(--text3)">✎</span>
      </div>
    </div>`).join('');
}

// ── RÉPÉTITIONS ──
function renderSets(){
  const el = document.getElementById('set-list-m');

    const dur = songs.reduce((a,s)=>a+(s.duration||0),0);
    const songRows2 = [...songRows].sort((a,b)=>(b.priority||0)-(a.priority||0)||(a.position||0)-(b.position||0));

// ── PRESTATIONS ──
function getConcertSongs(concertId, setId){
  const overrides = DB.concert_songs.filter(cs=>cs.concert_id===concertId).sort((a,b)=>a.position-b.position);
  if(overrides.length) return overrides;
  if(!setId) return [];
  return DB.set_songs.filter(ss=>ss.set_id===setId).sort((a,b)=>a.position-b.position)
    .map(ss=>({concert_id:concertId, song_id:ss.song_id, position:ss.position, notes:ss.set_notes||null}));
}

function renderCalendar(){
  const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const days = ['L','M','M','J','V','S','D'];
  const today = new Date();
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay  = new Date(calYear, calMonth+1, 0);
  let startDow = firstDay.getDay()-1; if(startDow<0) startDow=6;

  document.getElementById('cal-label-m').textContent = months[calMonth]+' '+calYear;
  document.getElementById('planning-sub-m').textContent =
    DB.events.filter(e=>e.date.startsWith(calYear+'-'+String(calMonth+1).padStart(2,'0'))).length+' événement(s) ce mois';

  const allEvts = [
    ...DB.events.map(e=>({date:e.date, label:'Répét.', css:'repet'})),
    ...DB.concerts.map(c=>({date:c.date, label:'★ '+c.name, css:'concert'})),
  ];

  let html = days.map(d=>`<div class="cal-day-name">${d}</div>`).join('');
  for(let i=0;i<startDow;i++){
    const d = new Date(calYear, calMonth, -startDow+i+1);
    html += `<div class="cal-cell dim"><div class="cal-date-num">${d.getDate()}</div></div>`;
  }
  for(let d=1;d<=lastDay.getDate();d++){
    const isToday = d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();
    const dateStr = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const evts = allEvts.filter(e=>e.date===dateStr);
    html += `<div class="cal-cell">
      <div class="cal-date-num${isToday?' today':''}">${d}</div>
      ${evts.map(e=>`<div class="cal-ev ${e.css}">${esc(e.label)}</div>`).join('')}
    </div>`;
  }
  const total = startDow + lastDay.getDate();
  const rem = (7-(total%7))%7;
  for(let i=1;i<=rem;i++) html += `<div class="cal-cell dim"><div class="cal-date-num">${i}</div></div>`;

  document.getElementById('cal-grid-m').innerHTML = html;
}

window.calNav = function(dir){
  calMonth += dir;
  if(calMonth<0){calMonth=11;calYear--}
  if(calMonth>11){calMonth=0;calYear++}
  renderCalendar();
};

// ── IMPRESSION ──
function buildPrintRows(songs, notesMap){
  return songs.map((entry,i)=>{
    const s = DB.songs.find(x=>x.id===(entry.song_id||entry.id));
    if(!s) return '';
    const note = [notesMap?notesMap[s.id]:null, entry.notes, s.notes].filter(Boolean).join(' — ');
    const improvs = DB.members.filter(m=>{
      const p = DB.preferences.find(pr=>pr.member_id===m.id&&pr.song_id===s.id);
      return p?.impro;
    });
    return `<tr>
      <td style="padding:8px;text-align:center;font-size:12px;color:#888">${i+1}</td>
      <td style="padding:8px">
        <strong style="font-size:13px">${esc(s.name)}</strong>
        ${s.artist?`<span style="color:#888;font-size:11px"> — ${esc(s.artist)}</span>`:''}
        ${note?`<div style="font-size:11px;color:#e6860a;margin-top:3px">⚠ ${esc(note)}</div>`:''}
      </td>
      <td style="padding:8px;font-size:12px;font-weight:600">${s.key||''}</td>
      <td style="padding:8px;font-size:11px;color:#555;text-align:center">${s.tempo||''}</td>
      <td style="padding:8px;font-size:11px;color:#1a6faf;font-style:italic">${improvs.map(m=>m.prenom).join(', ')}</td>
    </tr>`;
  }).join('');
}

function openPrint(html){
  const win = window.open('','_blank');
  if(win){ win.document.write(html); win.document.close(); }
  else alert('Autorisez les popups pour imprimer.');
}

function printSet(setId){
  const set = DB.sets.find(x=>x.id===setId);
  if(!set) return;
  const rows = DB.set_songs.filter(ss=>ss.set_id===setId).sort((a,b)=>a.position-b.position);
  const notesMap = {};
  rows.forEach(ss=>{ if(ss.set_notes) notesMap[ss.song_id]=ss.set_notes; });
  openPrint(buildPrintPage(set.name, 'Programme de répétition', '', '', '', buildPrintRows(rows, notesMap)));
}

function printConcert(concertId){
  const c = DB.concerts.find(x=>x.id===concertId);
  if(!c) return;
  const cSongs = getConcertSongs(concertId, c.set_id);
  const dateStr = c.date ? new Date(c.date+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) : 'Date à confirmer';
  openPrint(buildPrintPage(c.name, c.set_id?'♩ '+DB.sets.find(s=>s.id===c.set_id)?.name:'', dateStr, c.time?.slice(0,5)||'', c.venue||'', buildPrintRows(cSongs, null)));
}

async function mSetInterest(songId, value){
  if(!_prefSetId||!_prefMemberId) return;
  const p = DB.preferences.find(pr=>pr.set_id==_prefSetId&&pr.member_id==_prefMemberId&&pr.song_id==songId);
  const payload = {set_id:_prefSetId, member_id:_prefMemberId, song_id:songId, interest:value, impro:p?.impro??false};
  await mUpsertPref(payload);
  renderPrefBody();
}

async function mSetImpro(songId, value){
  if(!_prefSetId||!_prefMemberId) return;
  const p = DB.preferences.find(pr=>pr.set_id==_prefSetId&&pr.member_id==_prefMemberId&&pr.song_id==songId);
  const payload = {set_id:_prefSetId, member_id:_prefMemberId, song_id:songId, interest:p?.interest??null, impro:value};
  await mUpsertPref(payload);
}

async function mUpsertPref(payload){
  const status = document.getElementById('pref-save-status-m');
  status.textContent = '⟳ Sauvegarde…';
  try {
    const existing = DB.preferences.find(p=>p.set_id==payload.set_id&&p.member_id==payload.member_id&&p.song_id==payload.song_id);
    let error;
    if(existing){
      ({error} = await sb.from('preferences').update({interest:payload.interest,impro:payload.impro}).eq('id',existing.id));
    } else {
      ({error} = await sb.from('preferences').insert(payload));
    }
    if(error) throw error;
    const idx = DB.preferences.findIndex(p=>p.set_id==payload.set_id&&p.member_id==payload.member_id&&p.song_id==payload.song_id);
    if(idx>=0) DB.preferences[idx] = {...DB.preferences[idx],...payload};
    else DB.preferences.push({...payload, id:Date.now()});
    status.textContent = '✓ Sauvegardé';
    setTimeout(()=>{ status.textContent=''; }, 2000);
  } catch(e){
    status.textContent = '✗ Erreur';
  }
}

  const rawRows = cSongList || DB.set_songs.filter(ss=>ss.set_id===setId).sort((a,b)=>a.position-b.position);
  const songRows = [...rawRows].sort((a,b)=>(b.priority||0)-(a.priority||0)||(a.position||0)-(b.position||0));
  const songs = songRows.map(r=>DB.songs.find(s=>s.id===(r.song_id||r.id))).filter(Boolean);

  if(!songs.length){
    body.innerHTML='<div class="empty"><p>Aucun morceau dans ce programme.</p></div>';
    return;
  }

  const interestIcon  = {0:'✗', 1:'~', 2:'✓'};
  const interestColor = {0:'#c93a3a', 1:'#b8860b', 2:'#2a9e78'};
  const interestLabel = {0:'Non', 1:'Moyen', 2:'Oui !'};

  body.innerHTML = songs.map((s,i)=>{
    const row = songRows[i];
    const noteSet  = row?.set_notes || row?.notes || '';
    const noteSong = s.notes || '';
    const allNotes = [noteSet, noteSong].filter(Boolean).join(' — ');

    const memberPrefs = DB.members.map(m=>({
      m,
      p: setId ? DB.preferences.find(pr=>pr.set_id==setId&&pr.member_id==m.id&&pr.song_id==s.id) : null
    }));
    const enthousiastes = memberPrefs.filter(x=>x.p?.interest===2);
    const impros = memberPrefs.filter(x=>x.p?.impro);
    const color = familyColors;

    return `<div class="synth-song-card">
      <div class="synth-song-title">${i+1}. ${esc(s.name)}</div>
      ${s.artist?`<div class="synth-song-artist">${esc(s.artist)}</div>`:''}
      ${allNotes?`<div class="synth-song-notes">⚠ ${esc(allNotes)}</div>`:''}
      <div class="synth-badges">
        ${s.key?`<span class="synth-badge" style="background:rgba(42,95,160,.12);color:var(--accent2)">${esc(s.key)}</span>`:''}
        ${s.tempo?`<span class="synth-badge" style="background:rgba(42,158,120,.12);color:var(--green)">♩${s.tempo}</span>`:''}
        ${enthousiastes.length?`<span class="synth-badge synth-badge-yes">✓ ${enthousiastes.length} partant${enthousiastes.length>1?'s':''}</span>`:''}
        ${impros.length?`<span class="synth-badge synth-badge-impro">🎸 ${impros.map(x=>x.m.prenom).join(', ')}</span>`:''}
      </div>
      ${impros.length?`<div class="synth-members">
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;font-weight:600">Impros / Solos</div>
        ${impros.map(({m})=>{
          const bg = familyColors[m.family]||'#888';
          return `<div class="synth-member-row">
            <div class="synth-avatar" style="background:${bg}">${esc(m.avatar||(m.prenom||'?').charAt(0))}</div>
            <span class="synth-member-name">${esc(m.prenom)}</span>
            <span class="synth-impro-tag">🎸 impro</span>
          </div>`;
        }).join('')}
      </div>`:''} 
    </div>`;
  }).join('');
}

// ===== EDIT PANEL (répétitions & prestations) =====
let _editType = null;   // 'set' | 'concert'
let _editId   = null;
let _editSongs = [];    // working copy [{song_id, position, notes/set_notes}]

function openEditPanel(type, id){
  _editType = type;
  _editId   = id;
  if(type==='set'){
    const set = DB.sets.find(s=>s.id===id);
    if(!set) return;
    document.getElementById('edit-panel-title').textContent = '✏️ Répétition';
    _editSongs = DB.set_songs.filter(ss=>ss.set_id===id)
      .sort((a,b)=>a.position-b.position)
      .map(ss=>({song_id:ss.song_id, position:ss.position, notes:ss.set_notes||'', priority:ss.priority||0, local_key:ss.local_key||'', local_bpm:ss.local_bpm||'', local_struct:ss.local_struct||''}));
    buildEditBody({name:set.name, notes:set.notes||''});
  } else {
    const c = DB.concerts.find(x=>x.id===id);
    if(!c) return;
    document.getElementById('edit-panel-title').textContent = '✏️ Prestation';
    // use concert_songs if they exist, else inherit from set
    const overrides = DB.concert_songs.filter(cs=>cs.concert_id===id).sort((a,b)=>a.position-b.position);
    if(overrides.length){
      _editSongs = overrides.map(cs=>({song_id:cs.song_id, position:cs.position, notes:cs.notes||''}));
    } else if(c.set_id){
      _editSongs = DB.set_songs.filter(ss=>ss.set_id===c.set_id)
        .sort((a,b)=>a.position-b.position)
        .map(ss=>({song_id:ss.song_id, position:ss.position, notes:ss.set_notes||''}));
    } else {
      _editSongs = [];
    }
    buildEditBody({name:c.name, notes:c.notes||''});
  }
  document.getElementById('edit-panel').classList.add('open');
}

function buildEditBody({name, notes}){
  const usedIds = _editSongs.map(s=>s.song_id);
  const available = DB.songs.filter(s=>!usedIds.includes(s.id))
    .sort((a,b)=>a.name.localeCompare(b.name,'fr'));

  const songsHtml = _editSongs.map((ss,i)=>{
    const s = DB.songs.find(x=>x.id===ss.song_id);
    if(!s) return '';
    return `<div style="border-bottom:1px solid var(--border);padding:10px 18px 12px;background:${i%2===0?'var(--surface)':'var(--surface2)'}">
      <!-- Titre -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:11px;color:var(--text3);min-width:18px;text-align:right">${i+1}</span>
        <span style="font-size:13px;font-weight:700;color:var(--text);flex:1">${esc(s.name)}</span>
        <button class="edit-song-del" onclick="editRemoveSong(${i})" title="Supprimer">🗑</button>
      </div>
      <!-- Tonalité / BPM / Structure -->
      <div style="display:grid;grid-template-columns:64px 58px 1fr;gap:8px;padding-left:26px;margin-bottom:8px;align-items:end">
        <div>
          <div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:2px">Tonalité</div>
          <input type="text" maxlength="5" placeholder="${esc(s.key||'—')}"
            value="${esc(ss.local_key||'')}"
            oninput="_editSongs[${i}].local_key=this.value||''"
            style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 7px;font-size:13px;color:var(--text);font-family:inherit;outline:none;box-sizing:border-box">
        </div>
        <div>
          <div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:2px">BPM</div>
          <input type="number" min="0" max="999" placeholder="${s.bpm||'—'}"
            value="${ss.local_bpm||''}"
            oninput="_editSongs[${i}].local_bpm=this.value?parseInt(this.value):''"
            style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 7px;font-size:13px;color:var(--text);font-family:inherit;outline:none;box-sizing:border-box;-moz-appearance:textfield;appearance:textfield">
        </div>
        <div>
          <div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:2px">Structure</div>
          <input type="text" placeholder="ex : A/A/B/A"
            value="${esc(ss.local_struct||'')}"
            oninput="_editSongs[${i}].local_struct=this.value||''"
            style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 7px;font-size:13px;color:var(--text);font-family:inherit;outline:none;box-sizing:border-box">
        </div>
      </div>
      <!-- Note -->
      <div style="padding-left:26px">
        <input type="text" placeholder="⚠ Note pour ce set…"
          value="${esc(ss.notes)}"
          oninput="editUpdateNote(${i},this.value)"
          style="width:100%;background:rgba(185,106,40,.06);border:1px dashed rgba(185,106,40,.4);border-radius:6px;font-size:12px;color:var(--text2);font-family:inherit;outline:none;padding:6px 10px;box-sizing:border-box">
      </div>
    </div>`;
  }).join('');

  const addOptions = available.length
    ? `<select class="edit-add-select" id="edit-add-select">
        <option value="">— Ajouter un morceau —</option>
        ${available.map(s=>`<option value="${s.id}">${esc(s.name)}${s.key?' ('+esc(s.key)+')':''}</option>`).join('')}
      </select>`
    : `<div style="font-size:12px;color:var(--text3);padding:4px 0">Tous les morceaux sont déjà dans ce programme.</div>`;

  document.getElementById('edit-sheet-body').innerHTML = `
    <div class="edit-field-row">
      <div class="edit-field-label">Nom</div>
      <input class="edit-field-input" type="text" id="edit-name-input" value="${esc(name)}">
    </div>
    <div class="edit-field-row">
      <div class="edit-field-label">Notes générales</div>
      <textarea class="edit-field-input" id="edit-notes-input" placeholder="Notes…">${esc(notes)}</textarea>
    </div>
    <div class="edit-field-row" style="padding-bottom:6px">
      <div class="edit-field-label">Morceaux (${_editSongs.length})</div>
    </div>
    <div class="edit-song-list" id="edit-song-list">${songsHtml}</div>
    <div class="edit-add-song-row">${addOptions}</div>
    <div id="edit-status" class="edit-status"></div>
    <button class="edit-save-btn" onclick="saveEdit()">💾 Enregistrer</button>
  `;

  // Bind add-song select
  const sel = document.getElementById('edit-add-select');
  if(sel) sel.addEventListener('change', function(){ if(this.value){ editAddSong(parseInt(this.value)); this.value=''; }});
}

function editRemoveSong(idx){
  _editSongs.splice(idx,1);
  rebuildSongList();
}

function editAddSong(songId){
  _editSongs.push({song_id:songId, position:_editSongs.length+1, notes:''});
  rebuildSongList();
}

function editUpdateNote(idx, val){
  if(_editSongs[idx]) _editSongs[idx].notes = val;
}

function rebuildSongList(){
  // Re-save note values from DOM before rebuilding
  _editSongs.forEach((ss,i)=>{
    const inp = document.querySelector(`#edit-song-list .edit-song-note-wrap:nth-of-type(${(i*2)+2}) .edit-song-note-input`);
    // safer: iterate all note inputs by order
  });
  // Collect current notes before rebuild
  const noteInputs = document.querySelectorAll('.edit-song-note-input');
  noteInputs.forEach((inp,i)=>{ if(_editSongs[i]) _editSongs[i].notes = inp.value; });
  // Rebuild
  const body = document.getElementById('edit-sheet-body');
  const name  = document.getElementById('edit-name-input')?.value||'';
  const notes = document.getElementById('edit-notes-input')?.value||'';
  buildEditBody({name, notes});
}

async function saveEdit(){
  const statusEl = document.getElementById('edit-status');
  const name  = (document.getElementById('edit-name-input')?.value||'').trim();
  const notes = (document.getElementById('edit-notes-input')?.value||'').trim();

  // Les valeurs sont déjà dans _editSongs via oninput

  if(!name){ statusEl.style.color='var(--red)'; statusEl.textContent='Le nom est obligatoire.'; return; }
  statusEl.textContent='Enregistrement…'; statusEl.style.color='var(--text3)';

  try {
    if(_editType==='set'){
      await sb.from('sets').update({name, notes:notes||null}).eq('id',_editId);
      await sb.from('set_songs').delete().eq('set_id',_editId);
      if(_editSongs.length){
        const rows = _editSongs.map((ss,i)=>({
          set_id:_editId, song_id:ss.song_id, position:i+1,
          set_notes:ss.notes||null, priority:ss.priority||0,
          local_key:ss.local_key||null, local_bpm:ss.local_bpm||null, local_struct:ss.local_struct||null
        }));
        await sb.from('set_songs').insert(rows);
      }
    } else {
      await sb.from('concerts').update({name, notes:notes||null}).eq('id',_editId);
      await sb.from('concert_songs').delete().eq('concert_id',_editId);
      if(_editSongs.length){
        const rows = _editSongs.map((ss,i)=>({
          concert_id:_editId, song_id:ss.song_id, position:i+1,
          notes:ss.notes||null
        }));
        await sb.from('concert_songs').insert(rows);
      }
    }
    await loadAll();
    statusEl.style.color='var(--green)'; statusEl.textContent='✓ Enregistré !';
    if(_editType==='set') renderSets(); else renderConcerts();
    setTimeout(()=>closeEditPanelDirect(), 900);
  } catch(e){
    console.error(e);
    statusEl.style.color='var(--red)'; statusEl.textContent='Erreur : ' + e.message;
  }
}

function closeEditPanel(e){
  if(e.target===document.getElementById('edit-panel')) closeEditPanelDirect();
}
function closeEditPanelDirect(){
  document.getElementById('edit-panel').classList.remove('open');
}










// ===== FEUILLE PRÉSENTIELLE MOBILE =====
let _fpmSetId=null,_fpmEId=null,_fpmCh={};
const _fpmC={'Cordes':['#e67e22','rgba(230,126,34,.15)'],'Cuivres':['#e74c3c','rgba(231,76,60,.15)'],'Bois':['#27ae60','rgba(39,174,96,.15)'],'Claviers':['#2980b9','rgba(41,128,185,.15)'],'Percussions':['#8e44ad','rgba(142,68,173,.15)'],'Voix':['#f39c12','rgba(243,156,18,.15)']};

function fpmOpen(sid){
  _fpmSetId=sid;
  const set=DB.sets.find(s=>s.id===sid); if(!set) return;
  const today=new Date().toISOString().slice(0,10);
  const evts=DB.events.filter(e=>e.set_id===sid&&e.type!=='prestation').sort((a,b)=>a.date.localeCompare(b.date));
  const shown=[...evts.filter(e=>e.date>=today).slice(0,8),...evts.filter(e=>e.date<today).slice(-2).reverse()];
  document.getElementById('fpm-title').textContent=set.name;
  document.getElementById('fpm-sub').textContent='Feuille présentielle';
  document.getElementById('fpm-sum').innerHTML='';
  document.getElementById('fpm-back-btn').style.display='none';
  document.getElementById('fpm-save-btn').style.display='none';
  document.getElementById('fpm-body').innerHTML=shown.length?shown.map(e=>{
    const d=new Date(e.date+'T12:00:00');
    const lbl=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    const time=e.time?' · '+e.time.slice(0,5):'';
    const isPast=e.date<today;
    const atts=DB.event_attendance.filter(a=>parseInt(a.event_id)===e.id);
    const p=atts.filter(a=>a.status==='present').length,q=atts.filter(a=>a.status==='maybe').length,ab=atts.filter(a=>a.status==='absent').length;
    return `<div class="fp-row-m" onclick="fpmOpenDate(${e.id})">
      <div style="flex:1">
        <div style="font-size:14px;font-weight:600;color:${isPast?'var(--text3)':'var(--text)'}">${isPast?'↩ ':'📅 '}${lbl}${time}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px">${(p||q||ab)?`${p?'✅'+p+' ':''}${q?'❓'+q+' ':''}${ab?'❌'+ab:''}`:'<i>Aucune réponse</i>'}</div>
      </div><span style="color:var(--text3);font-size:20px">›</span>
    </div>`;
  }).join(''):'<div style="padding:24px;text-align:center;color:var(--text3);font-style:italic">Aucune date planifiée.</div>';
  document.getElementById('fpm-wrap').style.display='flex';
}

function fpmShowDates(){
  _fpmEId=null; _fpmCh={};
  fpmOpen(_fpmSetId);
}

function fpmOpenDate(eid){
  _fpmEId=parseInt(eid); _fpmCh={};
  const e=DB.events.find(x=>x.id===_fpmEId); if(!e) return;
  // Pré-remplir "présent" pour les musiciens sans réponse
  const existing=DB.event_attendance.filter(a=>parseInt(a.event_id)===_fpmEId).map(a=>parseInt(a.member_id));
  DB.members.forEach(m=>{ if(!existing.includes(parseInt(m.id))) _fpmCh[m.id]='present'; });
  const set=e.set_id?DB.sets.find(s=>s.id===e.set_id):null;
  const d=new Date(e.date+'T12:00:00');
  document.getElementById('fpm-title').textContent=set?.name||'Répétition';
  document.getElementById('fpm-sub').textContent=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+(e.time?' · '+e.time.slice(0,5):'');
  document.getElementById('fpm-st').textContent='';
  document.getElementById('fpm-back-btn').style.display='block';
  document.getElementById('fpm-save-btn').style.display='block';
  fpmRM();
}

function fpmRM(){
  const atts=DB.event_attendance.filter(a=>parseInt(a.event_id)===_fpmEId);
  const p=atts.filter(a=>a.status==='present').length,q=atts.filter(a=>a.status==='maybe').length,ab=atts.filter(a=>a.status==='absent').length;
  document.getElementById('fpm-sum').innerHTML=
    (p?`<span style="font-size:11px;padding:2px 7px;border-radius:8px;background:var(--surface2)">✅ ${p}</span>`:'')+
    (q?`<span style="font-size:11px;padding:2px 7px;border-radius:8px;background:var(--surface2)">❓ ${q}</span>`:'')+
    (ab?`<span style="font-size:11px;padding:2px 7px;border-radius:8px;background:var(--surface2)">❌ ${ab}</span>`:'');
  const myId=parseInt(_currentUserId||0);
  const icons={present:'✅',maybe:'❓',absent:'❌',unknown:'⬜'};
  document.getElementById('fpm-body').innerHTML=DB.members.map(m=>{
    const att=atts.find(r=>parseInt(r.member_id)===parseInt(m.id));
    const saved=att?.status||'unknown';
    const st=_fpmCh[m.id]!==undefined?_fpmCh[m.id]:saved;
    const isMe=parseInt(m.id)===myId;
    const [col,bg]=_fpmC[m.family]||['#888','rgba(136,136,136,.12)'];
    const av=m.avatar||(m.prenom?m.prenom[0].toUpperCase():'?');
    return `<div class="fp-mrow-m${isMe?' me':''}">
      <div class="fp-av-m" style="background:${bg};color:${col}">${av}</div>
      <span class="fp-nm-m">${esc(m.prenom||'')} ${esc(m.nom||'')}</span>
      ${isMe?`<div style="display:flex;gap:5px">
        <button class="fp-bt-m${st==='present'?' on p':''}" onclick="fpmMk(${m.id},'present')">✅</button>
        <button class="fp-bt-m${st==='maybe'  ?' on q':''}" onclick="fpmMk(${m.id},'maybe')">❓</button>
        <button class="fp-bt-m${st==='absent' ?' on a':''}" onclick="fpmMk(${m.id},'absent')">❌</button>
      </div>`:`<span style="font-size:18px;opacity:${st==='unknown'?.2:.9}">${icons[st]}</span>`}
    </div>`;
  }).join('');
}

function fpmMk(id,st){_fpmCh[id]=st;fpmRM();}

async function fpmSave(){
  const stEl=document.getElementById('fpm-st');
  stEl.style.color='var(--text3)';stEl.textContent='Enregistrement…';
  try{
    for(const [mid,status] of Object.entries(_fpmCh)){
      const ex=DB.event_attendance.find(a=>parseInt(a.event_id)===_fpmEId&&parseInt(a.member_id)===parseInt(mid));
      if(ex) await sb.from('event_attendance').update({status}).eq('id',ex.id);
      else   await sb.from('event_attendance').insert({event_id:_fpmEId,member_id:parseInt(mid),status});
    }
    await loadAll();_fpmCh={};fpmRM();renderSets();
    stEl.style.color='var(--green)';stEl.textContent='✓ Enregistré !';
    setTimeout(()=>{stEl.textContent='';},2500);
  }catch(err){stEl.style.color='var(--red)';stEl.textContent='Erreur: '+err.message;}
}

// ===== WELCOME MOBILE =====
const _famColM = {
  'Cordes':'#e67e22','Cuivres':'#e74c3c','Bois':'#27ae60',
  'Claviers':'#2980b9','Percussions':'#8e44ad','Voix':'#f39c12'
};

function showWelcomeM(){
  const grid = document.getElementById('wm-grid');
  grid.innerHTML = DB.members.map(m=>{
    const sel = m.id==_currentUserId ? 'selected' : '';
    return `<button class="wm-btn ${sel}" onclick="selectUserM('${m.id}',this)"
      style="border-color:${sel?_famColM[m.family]||'var(--accent)':'var(--border)'};
             ${sel?'background:'+(_famColM[m.family]||'var(--accent)')+';color:#fff':''}">
      ${esc(m.prenom)}
    </button>`;
  }).join('');
  if(_currentUserId && DB.members.find(m=>m.id==_currentUserId)){
    const btn = document.getElementById('wm-confirm');
    btn.disabled=false; btn.style.opacity='1';
  }
  document.getElementById('welcome-m').classList.remove('hidden');
}

function selectUserM(id, btn){
  _currentUserId = id;
  const m = DB.members.find(x=>x.id==id);
  document.querySelectorAll('.wm-btn').forEach(b=>{
    b.classList.remove('selected');
    b.style.borderColor='var(--border)';
    b.style.background='';
    b.style.color='';
  });
  const col = _famColM[m?.family]||'var(--accent)';
  btn.classList.add('selected');
  btn.style.borderColor=col;
  btn.style.background=col;
  btn.style.color='#fff';
  const confirmBtn = document.getElementById('wm-confirm');
  confirmBtn.disabled=false; confirmBtn.style.opacity='1';
}

function confirmUserM(){
  if(!_currentUserId) return;
  localStorage.setItem('amajazz_user_id', _currentUserId);
  document.getElementById('welcome-m').classList.add('hidden');
  document.getElementById('app').style.display='flex';
  updateUserBadgeM();
  renderDashboard();
}

function skipWelcomeM(){
  _currentUserId = null;
  localStorage.removeItem('amajazz_user_id');
  document.getElementById('welcome-m').classList.add('hidden');
  document.getElementById('app').style.display='flex';
  renderDashboard();
}

function updateUserBadgeM(){
  // Update nav bar or header with current user — lightweight
  const m = _currentUserId ? DB.members.find(x=>x.id==_currentUserId) : null;
  const badge = document.getElementById('user-badge-m');
  if(!badge) return;
  if(m){ badge.textContent=m.prenom; badge.style.display='inline'; }
  else { badge.style.display='none'; }
}

async function init(){
  try {
    setSyncStatus('loading');
    await loadAll();
    setSyncStatus('ok');
    document.getElementById('loading').style.display='none';
    if(!_currentUserId || !DB.members.find(m=>m.id==_currentUserId)){
      showWelcomeM();
    } else {
      document.getElementById('app').style.display='flex';
      updateUserBadgeM();
      renderDashboard();
    }
  } catch(e){
    console.error(e);
    setSyncStatus('error');
    document.getElementById('loading').innerHTML =
      '<div class="loading-logo" style="color:#e87c7c">Erreur</div><div class="loading-sub">Connexion impossible</div>';
  }
}

init();
</script>
